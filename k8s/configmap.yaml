apiVersion: v1
kind: ConfigMap
metadata:
  name: sortarr-config
  namespace: seashell
data:
  # v2 configuration
  SORTARR_PUBLIC_URL: "https://sortarr.bateau.cloud"
  SORTARR_CLIENT_SECRET_PATH: "/data/client_secret.json"
  SORTARR_DATABASE_FILE: "/data/sortarr.db"
  SORTARR_SCHEDULE: "0 */6 * * *"
  SORTARR_REPROCESS_DAYS: "2"
  SORTARR_ACTIVITY_LIMIT: "0"
  SORTARR_SUBSCRIPTION_LIMIT: "0"
  SORTARR_LOG_LEVEL: "info"
  SORTARR_API_PORT: "8080"