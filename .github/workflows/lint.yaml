---
on:
  pull_request:
    branches:
      - main

name: Commit lint
jobs:
  lint:
    uses: nrkno/github-workflow-semantic-release/.github/workflows/workflow.yaml@19539156fb78db20da81da4f502d433f476d3c31 # v4.13.0
    with:
      runs-on: ubuntu-latest
      release-enabled: false
      lint-enabled: true