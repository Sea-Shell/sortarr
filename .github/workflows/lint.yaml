---
on:
  pull_request:
    branches:
      - main

name: Commit lint
jobs:
  lint:
    uses: nrkno/github-workflow-semantic-release/.github/workflows/workflow.yaml@5f3998b2429f01ea86190e538e85ee3844c56f22 # v5.1.1
    with:
      runs-on: ubuntu-latest
      release-enabled: false
      lint-enabled: true